name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glimt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        go: ["1.25", "1.26"]

    name: Go ${{ matrix.go }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Run tests
        run: make test TEST_FLAGS="-v"

      - name: Run tests with race detector
        run: make test TEST_FLAGS="-race -v"

      - name: Run integration tests
        run: make integration
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/glimt_test?sslmode=disable
